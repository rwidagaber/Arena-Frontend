<header class="gympro-header-exact sticky-top px-4 py-3">
  <div
    class="container-fluid max-header-width d-flex align-items-center justify-content-between mx-auto"
  >
<!-- LEFT BLOCK: Brand Identity (Perfect Spacing & Icon Scale Match) -->
<div class="brand-v3-exact d-flex align-items-center gap-3.5">
  <div class="logo-circle-exact">
    <!-- Scaled up viewBox canvas slightly for high fidelity visibility -->
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0c0f17" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <!-- Dumbbell 1: Top-Left to Bottom-Right -->
      <g>
        <line x1="5" y1="5" x2="19" y2="19" />
        <line x1="6.5" y1="9.5" x2="9.5" y2="6.5" />
        <line x1="14.5" y1="17.5" x2="17.5" y2="14.5" />
        <line x1="5" y1="8" x2="8" y2="5" />
        <line x1="16" y1="19" x2="19" y2="16" />
      </g>
      
      <!-- Dumbbell 2: Bottom-Left to Top-Right -->
      <g>
        <line x1="5" y1="19" x2="19" y2="5" />
        <line x1="6.5" y1="14.5" x2="9.5" y2="17.5" />
        <line x1="14.5" y1="6.5" x2="17.5" y2="9.5" />
        <line x1="5" y1="16" x2="8" y2="19" />
        <line x1="16" y1="5" x2="19" y2="8" />
      </g>
    </svg>
  </div>
  <span class="brand-text-exact font-display">GymPro<span class="dot-lime">.</span></span>
</div>

    <!-- CENTER BLOCK: Clean Navigation Structure (Store and Blog removed) -->
    <nav class="d-none d-lg-block">
      <ul class="nav-links-exact d-flex align-items-center mb-0 list-unstyled">
        <li>
          <a
            href="#"
            (click)="navigateToTab('home', $event)"
            class="nav-item-exact"
            [class.text-lime-active]="activeTab === 'home'"
          >
            Home <i></i>
          </a>
        </li>
        <li>
          <a
            href="#"
            (click)="navigateToTab('about', $event)"
            class="nav-item-exact"
            [class.text-lime-active]="activeTab === 'about'"
          >
            About Us
          </a>
        </li>

        <!-- Conditionally Rendered Pages Link Option (Appears only after login) -->
        <li *ngIf="isLoggedIn">
          <a
            href="#"
            (click)="navigateToTab('dashboard', $event)"
            class="nav-item-exact"
            [class.text-lime-active]="activeTab === 'dashboard'"
          >
            Pages <i class="bi bi-chevron-down ms-1 fs-micro-arrow"></i>
          </a>
        </li>

        <li>
          <a
            href="#"
            (click)="navigateToTab('contact', $event)"
            class="nav-item-exact"
            [class.text-lime-active]="activeTab === 'contact'"
          >
            Contact Us
          </a>
        </li>
      </ul>
    </nav>

    <!-- RIGHT BLOCK: Replaced CTA with Log In and Sign Up layout elements -->
    <div class="d-flex align-items-center gap-3">
      <a
        href="#"
        (click)="onLoginClick($event)"
        class="btn-login-exact font-display text-decoration-none"
      >
        Log In
      </a>
      <button
        (click)="onSignUpClick()"
        class="btn-signup-exact font-display d-flex align-items-center justify-content-center gap-2"
      >
        <span>Sign Up</span>
        <i class="bi bi-arrow-up-right"></i>
      </button>
    </div>
  </div>
</header>
