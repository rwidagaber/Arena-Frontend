<aside class="dash-sidebar">
  <div class="sidebar-brand">
    <div class="brand-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="5" x2="19" y2="19" />
        <line x1="6.5" y1="9.5" x2="9.5" y2="6.5" />
        <line x1="14.5" y1="17.5" x2="17.5" y2="14.5" />
        <line x1="5" y1="8" x2="8" y2="5" />
        <line x1="16" y1="19" x2="19" y2="16" />
        <line x1="5" y1="19" x2="19" y2="5" />
        <line x1="6.5" y1="14.5" x2="9.5" y2="17.5" />
        <line x1="14.5" y1="6.5" x2="17.5" y2="9.5" />
        <line x1="5" y1="16" x2="8" y2="19" />
        <line x1="16" y1="5" x2="19" y2="8" />
      </svg>
    </div>
    <span class="brand-text">Arena<span class="brand-accent">.</span></span>
  </div>

  <nav class="sidebar-nav">
    @for (item of items; track item.key) {
      <button
        class="sidebar-item"
        [class.active]="activeSection() === item.key"
        (click)="select(item.key)"
      >
        <span class="sidebar-icon">
          @switch (item.icon) {
            @case ('user') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            }
            @case ('dumbbell') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5 17.5 17.5M6.5 17.5 17.5 6.5"/><line x1="6" y1="12" x2="18" y2="12"/></svg>
            }
            @case ('utensils') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
            }
            @case ('calendar-alt') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            }
            @case ('clock') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            }
            @case ('clipboard') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M9 14l2 2 4-4"/></svg>
            }
            @case ('robot') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>
            }
          }
        </span>
        <span class="sidebar-label">{{ item.label | translate }}</span>
      </button>
    }
  </nav>

  <div class="sidebar-footer">
    <button class="sidebar-item sidebar-logout" (click)="logout()">
      <span class="sidebar-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </span>
      <span class="sidebar-label">{{ 'sidebar.logout' | translate }}</span>
    </button>
  </div>
</aside>
