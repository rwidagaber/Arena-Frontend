<aside class="dash-sidebar">
  <div class="sidebar-brand">
    <div class="brand-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
        <path d="M6.5 6.5 17.5 17.5M6.5 17.5 17.5 6.5"/>
        <line x1="6" y1="12" x2="18" y2="12"/>
      </svg>
    </div>
    <span class="brand-text">Arena</span>
  </div>

  <nav class="sidebar-nav">
    @for (item of items; track item.key) {
      <button
        class="sidebar-item"
        [class.active]="activeSection() === item.key"
        (click)="select(item.key)"
      >
        <span class="sidebar-icon">
          @switch (item.icon) {
            @case ('grid') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            }
            @case ('dumbbell') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M6.5 6.5 17.5 17.5M6.5 17.5 17.5 6.5"/><line x1="6" y1="12" x2="18" y2="12"/></svg>
            }
            @case ('utensils') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
            }
            @case ('shield') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>
            }
            @case ('chart') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            }
            @case ('settings') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            }
          }
        </span>
        <span class="sidebar-label">{{ item.label | translate }}</span>
        @if (item.key === 'profile') {
          <span class="sidebar-active-bar"></span>
        }
      </button>
    }
  </nav>

  <div class="sidebar-membership">
    <span class="membership-label">MEMBERSHIP</span>
    @if (hasSubscription()) {
      <div class="membership-badge-row">
        <span class="plan-badge">{{ planLevel() || 'Active' }}</span>
        <span class="plan-name">{{ planName() || 'Member' }} Member</span>
      </div>
      <span class="plan-expiry">{{ 'memberProfile.expires' | translate }} {{ expiryDate() || '—' }}</span>
      <div class="plan-progress-bar">
        <div class="plan-progress-fill" [style.width.%]="membershipProgress()"></div>
      </div>
      <button class="btn-renew" (click)="renewPlan.emit()">
        {{ 'memberProfile.renewPlan' | translate }}
      </button>
    } @else {
      <p class="no-plan-text">{{ 'memberProfile.noActivePlan' | translate }}</p>
      <button class="btn-renew" (click)="renewPlan.emit()">
        {{ 'memberProfile.getPlan' | translate }}
      </button>
    }
  </div>

  <div class="sidebar-footer">
    <button class="sidebar-item sidebar-logout" (click)="logout()">
      <span class="sidebar-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </span>
      <span class="sidebar-label">{{ 'sidebar.logout' | translate }}</span>
    </button>
  </div>
</aside>
