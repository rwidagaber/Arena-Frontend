<div class="workout-app-root">
  <div class="dashboard-container">
    <nav class="nav-wrapper">
      <button *ngFor="let day of workoutDays" (click)="activeDay = day" 
              [class.active-btn]="activeDay === day" class="nav-tab">
        {{ day }}
      </button>
    </nav>

    <header class="hero-card">
      <img [src]="dayImage" [alt]="activeDay" class="hero-img">
      <div class="hero-content">
        <span class="eyebrow">Training Session</span>
        <h1 class="hero-title">{{ activeDay }}</h1>
      </div>
    </header>

    <section class="analytics-row">
      <div class="analytic-card">
        <small>Adherence</small>
        <div class="gauge-container"><div class="gauge-fill" [style.width.%]="consistency.percentage"></div></div>
        <div class="value">{{ consistency.percentage }}%</div>
      </div>
      <div class="analytic-card"><small>Volume Trend</small><div class="value">+4.2%</div></div>
      <div class="analytic-card"><small>Sessions</small><div class="value">{{ consistency.totalDays }}</div></div>
    </section>

    <section class="exercise-list">
      <div *ngFor="let workout of currentWorkouts" class="workout-card" [class.completed]="workout.completed">
        <div class="workout-thumb-wrapper"><img [src]="workout.imageUrl" [alt]="workout.name"></div>
        <div class="workout-details">
          <h4 class="workout-name">{{ workout.name }} <span *ngIf="workout.isPB" class="pb-badge">PB</span></h4>
          <span class="category-badge">{{ workout.category }}</span>
        </div>
        <div class="workout-metrics">
          <div class="meta"><span>Sets</span><strong>{{ workout.sets }}</strong></div>
          <div class="meta"><span>Reps</span><strong>{{ workout.reps }}</strong></div>
          <div class="meta"><span>Load</span><strong>{{ workout.weight }}kg</strong></div>
          <button class="check-btn" (click)="toggleComplete(workout)">
            <span *ngIf="!workout.completed">✓</span>
            <span *ngIf="workout.completed">↺</span>
          </button>
        </div>
      </div>
    </section>
  </div>
</div>
